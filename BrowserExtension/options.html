<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AltTabSucks Options</title>
  <style>
    body { font-family: monospace; font-size: 13px; padding: 16px; max-width: 360px; }
    label { display: block; margin-bottom: 10px; }
    .label-text { display: block; margin-bottom: 4px; }
    .input-row { display: flex; gap: 6px; }
    .input-row select,
    .input-row input { flex: 1; min-width: 0; }
    select, input { width: 100%; box-sizing: border-box; padding: 4px; font-family: monospace; font-size: 13px; }
    button { padding: 4px 12px; font-family: monospace; }
    #fetch-profiles { padding: 4px 8px; }
    #save { margin-top: 10px; }
    #status { margin-top: 8px; color: green; min-height: 1em; }
    .hint { font-size: 11px; color: #888; margin-top: 3px; }
    hr { border: none; border-top: 1px solid #ddd; margin: 16px 0; }
    #redirects-list, #ua-rules-list { margin-bottom: 6px; }
    #redirect-add-row, #ua-add-row { display: flex; flex-direction: column; gap: 4px; }
    #redirect-add, #ua-add { align-self: flex-start; margin-top: 2px; }
    .rule-row { margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px solid #f0f0f0; }
    .rule-row:last-child { border-bottom: none; margin-bottom: 0; }
    .rule-urls { word-break: break-all; margin-bottom: 2px; }
    .rule-meta { display: flex; align-items: center; gap: 4px; }
    .rule-arrow { color: #888; flex-shrink: 0; }
    .rule-target { flex: 1; word-break: break-all; color: #444; font-size: 11px; min-width: 0; }
    .rule-btn { padding: 2px 6px; font-size: 11px; cursor: pointer; flex-shrink: 0; }
    .rule-editing input, .rule-editing select, .rule-editing textarea { width: 100%; box-sizing: border-box; margin-bottom: 3px; }
    .rule-edit-actions { display: flex; gap: 4px; }
  </style>
</head>
<body>
  <h2>AltTabSucks Options</h2>
  <label>
    <span class="label-text">Auth token (shown by installer.ps1 or in Server\token.txt)</span>
    <input id="auth-token" type="text" placeholder="paste token here">
  </label>
  <label>
    <span class="label-text">Profile</span>
    <div class="input-row">
      <select id="profile-select"></select>
      <button id="fetch-profiles" title="Refresh profile list from AltTabSucks server">↺</button>
    </div>
    <div id="profile-hint" class="hint"></div>
  </label>
  <button id="save">Save</button>
  <div id="status"></div>

  <hr>
  <h3 style="margin: 0 0 10px;">URL Redirects</h3>
  <div id="redirects-list"></div>
  <div id="redirect-add-row">
    <input id="redirect-from" type="text" placeholder="from: ace.com">
    <input id="redirect-to"   type="text" placeholder="to: https://acehardware.com">
    <button id="redirect-add">Add redirect</button>
  </div>
  <div class="hint">Matches <code>ace.com</code> and <code>www.ace.com</code>. "To" must be a full URL.</div>

  <script src="options.js"></script>
</body>
</html>
